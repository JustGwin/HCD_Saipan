<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday พี่สายป่าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffafbd;
      --secondary: #ffc3a0;
      --text: #5d4037;
      --pink: #d87093;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      font-family: 'Mali', cursive;
      color: var(--text);
      overflow: hidden;
    }

    /* Background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      z-index: 0;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      padding: 3rem 2.5rem;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      text-align: center;
      max-width: 500px;
      width: 90%;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease-out;
    }

    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 7px solid white;
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
      display: block;
      margin: 0 auto 1.5rem;
      animation: floatAnim 4s ease-in-out infinite;
    }

    .title {
      font-family: 'Itim', cursive;
      font-size: 2.5rem;
      color: var(--pink);
      margin-bottom: 4px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.05);
    }

    .subtitle {
      font-family: 'Itim', cursive;
      font-size: 1.6rem;
      color: var(--pink);
      margin-bottom: 1.2rem;
    }

    .msg {
      font-size: 1.05rem;
      line-height: 1.9;
      color: #795548;
      margin-bottom: 1.8rem;
    }

    .btn {
      background: var(--pink);
      color: white;
      border: none;
      padding: 12px 36px;
      border-radius: 50px;
      font-family: 'Itim', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 5px 15px rgba(216, 112, 147, 0.35);
    }

    .btn:hover {
      background: #c76082;
      transform: scale(1.06);
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Popup */
    .popup {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      padding: 2rem 2rem 1.8rem;
      max-width: 340px;
      width: 88%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      transform: scale(0.75);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.show .popup {
      transform: scale(1);
    }

    .popup-star {
      font-size: 2.8rem;
      display: inline-block;
      animation: spinStar 3s linear infinite;
      margin-bottom: 6px;
    }

    .popup-title {
      font-family: 'Itim', cursive;
      font-size: 1.8rem;
      color: var(--pink);
      margin-bottom: 8px;
    }

    .popup-icons {
      font-size: 1.5rem;
      letter-spacing: 5px;
      margin-bottom: 1rem;
    }

    .popup-msg {
      font-size: 1.05rem;
      color: #795548;
      line-height: 1.85;
      margin-bottom: 1.4rem;
    }

    .close-btn {
      background: var(--pink);
      color: white;
      border: none;
      padding: 10px 32px;
      border-radius: 50px;
      font-family: 'Itim', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(216, 112, 147, 0.35);
    }

    .close-btn:hover {
      background: #c76082;
      transform: scale(1.05);
    }

    /* Particles */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 2px;
      animation: fallDown linear forwards;
      z-index: 99;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatAnim {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    @keyframes spinStar {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes fallDown {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(220px) rotate(720deg); }
    }

    @media (max-width: 480px) {
      .profile-img { width: 120px; height: 120px; }
      .title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Background decorative blobs -->
  <div class="bg-blob" style="width:280px;height:280px;top:-60px;left:-60px;"></div>
  <div class="bg-blob" style="width:200px;height:200px;bottom:40px;right:-40px;"></div>

  <!-- Main card -->
  <div class="card">
    <img
      src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cTJhbG94Ynl1MXR6enBzZ2loYXJ3Z3VqcWh1amZrZ2p1N3BxdTljNCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/DyQrKMpqkAhNHZ1iWe/giphy.gif"
      alt="Birthday Person"
      class="profile-img"
    >
    <div class="title">Happy Birthday!</div>
    <div class="subtitle">To พี่สายป่าน</div>
    <p class="msg">
            ขอให้พี่สุขภาพแข็งแรง <br>
            เจอแต่เรื่องดีๆ มีความสุขมากๆ <br>
            ในทุกๆ วันของปีครับผมม <br>
            ขอให้คนรอบตัวมีแต่คนจริงใจฮะ
            ✨
    </p>
    <button class="btn" onclick="openWish()">อธิษฐานก่อนกด 🫵</button>
  </div>

  <!-- Wish popup overlay -->
  <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="popup" id="popup">
      <div class="popup-star">✨</div>
      <div class="popup-title">ไว้มีโอกาสเดะเลี้ยงชาบู</div>
      <div class="popup-icons">🎉🎂🎊🌟🎈</div>
      <p class="popup-msg">
        ขอให้คำอธิษฐาน <br>
        และทุกความปรารถนาดีๆ  <br>
        และขอให้ทุกสิ่งที่พี่หวังอยู่ <br>
        ของพี่เป็นจริง!🌸
      </p>
      <button class="close-btn" onclick="closeWish()">สาธุ99 🙏</button>
    </div>
  </div>

  <script>
    const colors = ['#ffafbd','#d87093','#ffc3a0','#ffe4b5','#98d8c8','#c5a3d4','#f7c5d3','#b5ead7'];
    let particleTimer = null;

    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 9 + 5;
      const duration = Math.random() * 1.5 + 1;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        left: ${Math.random() * 100}vw;
        top: ${Math.random() * 50}vh;
        animation-duration: ${duration}s;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), duration * 1000 + 100);
    }

    function openWish() {
      document.getElementById('overlay').classList.add('show');
      // Burst of particles on open
      for (let i = 0; i < 25; i++) {
        setTimeout(spawnParticle, i * 50);
      }
      // Continuous particles while popup is open
      particleTimer = setInterval(spawnParticle, 140);
    }

    function closeWish() {
      document.getElementById('overlay').classList.remove('show');
      clearInterval(particleTimer);
      particleTimer = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('overlay')) {
        closeWish();
      }
    }
  </script>

</body>
</html>
